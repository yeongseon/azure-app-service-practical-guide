        - article [ref=e258]:
          - heading "Azure PaaS Troubleshooting Labs ¶" [level=1] [ref=e259]:
            - text: Azure PaaS Troubleshooting Labs
            - link "¶" [ref=e260] [cursor=pointer]:
              - /url: "#azure-paas-troubleshooting-labs"
          - paragraph [ref=e261]: Reproducible experiments for Azure App Service, Azure Functions, and Azure Container Apps.
          - paragraph [ref=e262]: By Yeongseon Choe
          - separator [ref=e263]
          - paragraph [ref=e264]: This site documents hypothesis-driven experiments that reproduce failure modes, performance edge cases, and platform boundary ambiguities in Azure PaaS services. Each experiment records what was observed, what can be concluded, and what remains unproven.
          - paragraph [ref=e265]: The target audience is Azure support engineers, escalation engineers, and platform operators who need to distinguish between platform-side and application-side issues under real-world conditions.
          - paragraph [ref=e266]:
            - text: This site is the troubleshooting companion to the
            - link "practical guide series" [ref=e267] [cursor=pointer]:
              - /url: https://github.com/yeongseon?tab=repositories&q=practical-guide
            - text: ", not a replacement. The guides cover broad reference material; these labs cover deep, narrow investigation."
          - heading "Experiment Status Overview ¶" [level=2] [ref=e268]:
