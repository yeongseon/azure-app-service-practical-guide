          - paragraph [ref=e424]: "The experiment relied on App Service platform and workload signals that are available during real incidents:"
          - list [ref=e425]:
            - listitem [ref=e426]: Azure Monitor plan metrics for memory and CPU trend correlation.
            - listitem [ref=e427]: HTTP outcome tracking to identify 503 failures during startup and scale-out attempts.
            - listitem [ref=e428]: App Service restart/startup observations to detect crash-loop behavior.
            - listitem [ref=e429]: Side-by-side comparison between Flask/ZIP deploy and Node.js/container deployments on the same B1 Linux context.
          - 'heading "KQL: detect plan memory pressure over time ¶" [level=3] [ref=e430]':
            - text: "KQL: detect plan memory pressure over time"
            - link "¶" [ref=e431] [cursor=pointer]:
              - /url: "#kql-detect-plan-memory-pressure-over-time"
          - generic [ref=e433]:
            - navigation [ref=e434]:
              - button "Copy to clipboard" [ref=e435] [cursor=pointer]
            - code [ref=e436]: AzureMetrics | where ResourceProvider == "MICROSOFT.WEB" | where MetricName in ("MemoryPercentage", "CpuPercentage") | summarize AvgValue = avg(Total) by MetricName, bin(TimeGenerated, 5m), Resource | order by TimeGenerated asc
          - 'heading "KQL: correlate startup-time 503 failures ¶" [level=3] [ref=e437]':
            - text: "KQL: correlate startup-time 503 failures"
            - link "¶" [ref=e438] [cursor=pointer]:
              - /url: "#kql-correlate-startup-time-503-failures"
          - generic [ref=e440]:
            - navigation [ref=e441]:
              - button "Copy to clipboard" [ref=e442] [cursor=pointer]
            - code [ref=e443]: AppServiceHTTPLogs | where ScStatus == 503 | summarize Failures = count() by SiteName, bin(TimeGenerated, 5m) | order by TimeGenerated asc
          - 'heading "KQL: identify restart or crash-loop periods ¶" [level=3] [ref=e444]':
            - text: "KQL: identify restart or crash-loop periods"
            - link "¶" [ref=e445] [cursor=pointer]:
              - /url: "#kql-identify-restart-or-crash-loop-periods"
          - generic [ref=e447]:
            - navigation [ref=e448]:
              - button "Copy to clipboard" [ref=e449] [cursor=pointer]
            - code [ref=e450]: AppServiceConsoleLogs | where Message has_any ("restart", "stopping site", "starting site", "container", "failed") | project TimeGenerated, SiteName, Message | order by TimeGenerated asc
          - heading "8. Procedure ¶" [level=2] [ref=e451]:
            - text: 8. Procedure
            - link "¶" [ref=e452] [cursor=pointer]:
              - /url: "#8-procedure"
          - list [ref=e453]:
            - listitem [ref=e454]: Provision a shared B1 Linux App Service plan in koreacentral.
            - listitem [ref=e455]: Deploy the Flask application using ZIP deploy and establish a baseline with 2 apps allocating 100 MB each.
            - listitem [ref=e456]:
              - text: "Increase app count and memory patterns across these configurations for Flask/ZIP deploy:"
              - list [ref=e457]:
                - listitem [ref=e458]: 8 apps × 50 MB
                - listitem [ref=e459]: 4 apps × 175 MB
                - listitem [ref=e460]: 6 apps × 75 MB
            - listitem [ref=e461]: Record plan memory percentage, startup outcome, average response time, and 5xx behavior for each Flask scenario.
            - listitem [ref=e462]:
              - text: "Repeat comparable high-density scenarios using Node.js custom containers:"
              - list [ref=e463]:
                - listitem [ref=e464]: 8 apps × 50 MB
                - listitem [ref=e465]: 4 apps × 175 MB
            - listitem [ref=e466]: Compare stability, visible memory percentage, and error behavior between the two deployment models.
          - heading "9. Expected signal ¶" [level=2] [ref=e467]:
            - text: 9. Expected signal
            - link "¶" [ref=e468] [cursor=pointer]:
              - /url: "#9-expected-signal"
          - paragraph [ref=e469]: "If the hypothesis is correct, the signal should look like this:"
          - list [ref=e470]:
            - listitem [ref=e471]: Flask/ZIP deploy stays healthy in a lower memory zone.
            - listitem [ref=e472]: Cold-start time increases sharply before outright startup failure.
            - listitem [ref=e473]: At a higher threshold, newly started apps fail with 503 rather than degrading gracefully.
            - listitem [ref=e474]: Once the plan is both highly saturated and restarting, the system does not self-recover quickly and enters a crash loop.
            - listitem [ref=e475]: Node.js/custom container results do not mirror the same visible memory curve even when per-app allocations are configured similarly.
          - heading "10. Results ¶" [level=2] [ref=e476]:
