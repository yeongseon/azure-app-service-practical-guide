        - article [ref=e310]:
          - heading "Memory Pressure on App Service ¶" [level=1] [ref=e311]:
            - text: Memory Pressure on App Service
            - link "¶" [ref=e312] [cursor=pointer]:
              - /url: "#memory-pressure-on-app-service"
          - paragraph [ref=e314]: "Status: Published (실험 완료)"
          - heading "1. Question ¶" [level=2] [ref=e315]:
            - text: 1. Question
            - link "¶" [ref=e316] [cursor=pointer]:
              - /url: "#1-question"
          - paragraph [ref=e317]: How does plan-level memory pressure on a shared Azure App Service Linux plan affect startup success, cold-start duration, and stability, and does the behavior differ between Flask apps deployed with ZIP deploy and Node.js apps deployed as custom containers?
          - heading "2. Why this matters ¶" [level=2] [ref=e318]:
            - text: 2. Why this matters
            - link "¶" [ref=e319] [cursor=pointer]:
              - /url: "#2-why-this-matters"
          - paragraph [ref=e320]: Memory pressure is one of the fastest ways to turn a seemingly healthy App Service plan into a multi-app incident. Support cases often begin as “some apps are slow” and then escalate into “new apps do not start” or “apps keep restarting for no clear reason.”
          - paragraph [ref=e321]: "This experiment matters because it isolates a common support question: whether plan-level memory saturation causes predictable degradation patterns, and whether the same patterns appear equally for built-in runtime/ZIP deploy apps and custom container apps."
          - heading "3. Customer symptom ¶" [level=2] [ref=e322]:
            - text: 3. Customer symptom
            - link "¶" [ref=e323] [cursor=pointer]:
              - /url: "#3-customer-symptom"
          - paragraph [ref=e324]: "Typical customer reports matched the following patterns:"
          - list [ref=e325]:
            - listitem [ref=e326]: “The app was fine earlier, but after scaling app count on the same B1 plan, new apps return 503.”
            - listitem [ref=e327]: “Cold start suddenly takes several minutes even though code did not change.”
            - listitem [ref=e328]: “Apps keep restarting and never recover once memory gets tight.”
            - listitem [ref=e329]: “Containerized apps on the same SKU do not show the same failure pattern.”
          - heading "4. Hypothesis ¶" [level=2] [ref=e330]:
            - text: 4. Hypothesis
            - link "¶" [ref=e331] [cursor=pointer]:
              - /url: "#4-hypothesis"
          - paragraph [ref=e332]: "If shared-plan memory usage rises high enough on App Service Linux, Flask apps deployed through ZIP deploy will move through distinct degradation zones:"
          - list [ref=e333]:
            - listitem [ref=e334]: Stable operation below a plan-memory threshold.
            - listitem [ref=e335]: Startup delay as memory approaches saturation.
            - listitem [ref=e336]: Startup failure for newly added apps once memory crosses a higher threshold.
            - listitem [ref=e337]: A restart-driven death spiral once the plan remains above the critical threshold.
          - paragraph [ref=e338]: The parallel hypothesis is that Node.js custom containers on the same B1 Linux SKU will not expose the same external memory pattern because container memory accounting differs from ZIP deploy apps.
          - heading "5. Environment ¶" [level=2] [ref=e339]:
            - text: 5. Environment
            - link "¶" [ref=e340] [cursor=pointer]:
              - /url: "#5-environment"
