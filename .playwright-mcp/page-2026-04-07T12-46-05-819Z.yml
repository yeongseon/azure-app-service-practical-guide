          - heading "11. Interpretation ¶" [level=2] [ref=e571]:
            - text: 11. Interpretation
            - link "¶" [ref=e572] [cursor=pointer]:
              - /url: "#11-interpretation"
          - list [ref=e573]:
            - listitem [ref=e574]:
              - strong [ref=e575]: "[Measured]"
              - text: The Flask baseline at 2 apps × 100 MB remained stable at 76% memory, 934 ms average response time, and 0 5xx, establishing that the B1 Linux plan could handle moderate shared memory pressure without visible failure.
            - listitem [ref=e576]:
              - strong [ref=e577]: "[Observed]"
              - text: In the Flask 8 apps × 50 MB scenario, apps 7 and 8 failed with 503 instead of all apps degrading evenly. This is a capacity cliff pattern, not a smooth performance decline.
            - listitem [ref=e578]:
              - strong [ref=e579]: "[Measured]"
              - text: In the Flask 4 apps × 175 MB scenario, memory reached 95% and cold start increased to 6 minutes compared with a roughly 60-second baseline. This shows startup delay appears before total startup failure.
            - listitem [ref=e580]:
              - strong [ref=e581]: "[Observed]"
              - text: In the Flask 6 apps × 75 MB scenario, the plan entered a crash loop once memory stayed above 93% and restarts began.
            - listitem [ref=e582]:
              - strong [ref=e583]: "[Correlated]"
              - text: "The Flask degradation zones align with progressive operational impact: first latency, then startup failure, then restart-driven instability."
            - listitem [ref=e584]:
              - strong [ref=e585]: "[Measured]"
              - text: Node.js custom containers stayed within 73-77% observed memory across both 8×50 MB and 4×175 MB scenarios, with 0 errors in both cases.
            - listitem [ref=e586]:
              - strong [ref=e587]: "[Correlated]"
              - text: The absence of visible saturation and errors in the Node.js container runs, despite comparable scenario structure, indicates materially different memory accounting or isolation behavior versus Flask/ZIP deploy on the same SKU family.
            - listitem [ref=e588]:
              - strong [ref=e589]: "[Inferred]"
              - text: For ZIP deploy apps on B1 Linux, plan memory percentage is a useful leading indicator for incident progression because the warning, danger, and critical zones aligned with distinct operational outcomes.
            - listitem [ref=e590]:
              - strong [ref=e591]: "[Strongly Suggested]"
              - text: Support engineers should not assume that memory behavior observed in custom containers will predict memory behavior for built-in runtime or ZIP deploy workloads on the same plan type.
          - heading "12. What this proves ¶" [level=2] [ref=e592]:
            - text: 12. What this proves
            - link "¶" [ref=e593] [cursor=pointer]:
              - /url: "#12-what-this-proves"
          - paragraph [ref=e594]: "This experiment proves the following within the tested environment:"
          - list [ref=e595]:
            - listitem [ref=e596]: Shared-plan memory pressure on B1 Linux can produce clear degradation zones for Flask apps deployed through ZIP deploy.
            - listitem [ref=e597]: "For Flask/ZIP deploy, the degradation sequence was observable as: stable baseline → slow cold start → startup failure → death spiral."
            - listitem [ref=e598]: Startup failure can occur before every existing app shows an obvious steady-state performance collapse.
            - listitem [ref=e599]: In the tested scenarios, Node.js custom containers did not reproduce the same visible memory saturation or failure pattern.
          - heading "13. What this does NOT prove ¶" [level=2] [ref=e600]:
            - text: 13. What this does NOT prove
            - link "¶" [ref=e601] [cursor=pointer]:
              - /url: "#13-what-this-does-not-prove"
          - paragraph [ref=e602]:
            - text: This experiment does
            - strong [ref=e603]: not
            - text: "prove the following:"
          - list [ref=e604]:
            - listitem [ref=e605]: That the same thresholds apply to all SKUs, especially Premium or memory-optimized SKUs.
            - listitem [ref=e606]: That every Linux runtime behaves exactly like Flask/ZIP deploy.
            - listitem [ref=e607]: That container workloads are immune to memory pressure; only that the tested container scenarios remained stable and exposed different observed accounting.
            - listitem [ref=e608]: That CPU was irrelevant in every case; only that memory thresholds were the dominant differentiator in this experiment.
            - listitem [ref=e609]: That the exact 86%, 92%, and 93% thresholds are universal outside the tested B1 koreacentral environment on 2026-04-02.
          - heading "14. Support takeaway ¶" [level=2] [ref=e610]:
            - text: 14. Support takeaway
            - link "¶" [ref=e611] [cursor=pointer]:
              - /url: "#14-support-takeaway"
          - paragraph [ref=e612]: "For support triage on App Service Linux B1 plans:"
          - list [ref=e613]:
            - listitem [ref=e614]: If Flask or similar ZIP deploy apps begin showing long cold starts once plan memory enters the high-80% range, treat that as an early warning rather than waiting for outright failure.
            - listitem [ref=e615]: If memory exceeds roughly 92%, investigate shared-plan saturation immediately because new app starts may fail with 503.
            - listitem [ref=e616]: If memory exceeds 93% and restarts begin, prioritize mitigation over deep investigation because the system may already be in a death spiral.
            - listitem [ref=e617]: Do not transfer conclusions from custom container tests directly onto ZIP deploy incidents without checking how memory is actually being reported and enforced.
          - heading "15. Reproduction notes ¶" [level=2] [ref=e618]:
            - text: 15. Reproduction notes
            - link "¶" [ref=e619] [cursor=pointer]:
              - /url: "#15-reproduction-notes"
          - list [ref=e620]:
            - listitem [ref=e621]: "Keep the environment consistent: B1 Linux, koreacentral, same-day comparative runs where possible."
            - listitem [ref=e622]: Reproduce Flask and Node.js scenarios separately but on equivalent plan settings.
            - listitem [ref=e623]:
              - text: "Preserve the tested scenario sets exactly when comparing outcomes:"
              - list [ref=e624]:
                - listitem [ref=e625]: "Flask baseline: 2×100 MB"
                - listitem [ref=e626]: "Flask density test: 8×50 MB"
                - listitem [ref=e627]: "Flask high-allocation test: 4×175 MB"
                - listitem [ref=e628]: "Flask instability test: 6×75 MB"
                - listitem [ref=e629]: "Node.js container tests: 8×50 MB and 4×175 MB"
            - listitem [ref=e630]: Compare memory percentage, startup time, 503 count, and restart frequency rather than relying on only one signal.
            - listitem [ref=e631]: Treat the Flask degradation zones as environment-specific reproduction guidance, not as universal platform guarantees.
